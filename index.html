<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VPO Studio</title>  <script src="https://cdn.tailwindcss.com"></script>  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>  <style>
    body {
      margin: 0;
      background: #050816;
      font-family: Arial, sans-serif;
      overflow: hidden;
      color: white;
    }

    .grid-bg {
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style></head>
<body>
<div id="root"></div><script type="text/babel">
const { useState, useEffect } = React;

function App() {

  const [projectName, setProjectName] = useState('AI Visual Project');
  const [selectedAI, setSelectedAI] = useState('Claude');
  const [notes, setNotes] = useState('');
  const [generatedPrompt, setGeneratedPrompt] = useState('');

  const [blocks, setBlocks] = useState([
    {
      id: 1,
      title: 'Sidebar',
      x: 60,
      y: 80,
      width: 220,
      height: 320,
      color: 'rgba(99,102,241,0.25)'
    },
    {
      id: 2,
      title: 'Main Chat',
      x: 340,
      y: 80,
      width: 520,
      height: 340,
      color: 'rgba(16,185,129,0.25)'
    }
  ]);

  const [draggingId, setDraggingId] = useState(null);
  const [references, setReferences] = useState([]);
  const [sketches, setSketches] = useState([]);

  useEffect(() => {
    const saved = localStorage.getItem('vpo_notes');
    if(saved) setNotes(saved);
  }, []);

  useEffect(() => {
    localStorage.setItem('vpo_notes', notes);
  }, [notes]);

  const onMouseMove = (e) => {
    if(!draggingId) return;

    setBlocks(prev => prev.map(block => {
      if(block.id === draggingId) {
        return {
          ...block,
          x: e.clientX - 100,
          y: e.clientY - 60
        }
      }
      return block;
    }));
  };

  const onMouseUp = () => {
    setDraggingId(null);
  };

  const addBlock = () => {
    const newBlock = {
      id: Date.now(),
      title: 'New Section',
      x: 200,
      y: 200,
      width: 260,
      height: 180,
      color: 'rgba(236,72,153,0.25)'
    };

    setBlocks([...blocks, newBlock]);
  };

  const handleUpload = (event, type) => {
    const files = Array.from(event.target.files);

    files.forEach(file => {
      const reader = new FileReader();

      reader.onload = (e) => {
        const img = {
          id: Date.now() + Math.random(),
          src: e.target.result
        };

        if(type === 'reference') {
          setReferences(prev => [...prev, img]);
        } else {
          setSketches(prev => [...prev, img]);
        }
      };

      reader.readAsDataURL(file);
    });
  };

  const generatePrompt = () => {

    const structure = blocks.map(block => {
      return `- ${block.title} positioned at (${Math.round(block.x)}, ${Math.round(block.y)}) size ${block.width}x${block.height}`;
    }).join('
');

    const prompt = `
PROJECT: ${projectName}

TARGET AI: ${selectedAI}

VISUAL STRUCTURE:
${structure}

NOTES:
${notes || 'No notes provided'}

REFERENCES UPLOADED: ${references.length}
SKETCHES UPLOADED: ${sketches.length}

INSTRUCTIONS:
Create a premium futuristic interface respecting the visual hierarchy and UX layout described above.
`;

    setGeneratedPrompt(prompt);
  };

  const copyPrompt = async () => {
    if(!generatedPrompt) return;
    await navigator.clipboard.writeText(generatedPrompt);
    alert('Prompt copied');
  };

  return (
    <div
      className="w-screen h-screen flex"
      onMouseMove={onMouseMove}
      onMouseUp={onMouseUp}
    >

      <div className="w-72 bg-black/40 border-r border-white/10 flex flex-col">

        <div className="p-6 border-b border-white/10">
          <h1 className="text-3xl font-bold">VPO Studio</h1>
          <p className="text-gray-400 mt-2 text-sm">
            Visual Prompt Orchestrator
          </p>
        </div>

        <div className="p-4 space-y-3">

          <input
            value={projectName}
            onChange={(e) => setProjectName(e.target.value)}
            className="w-full p-3 rounded-xl bg-white/10 border border-white/10 outline-none"
          />

          <button
            onClick={addBlock}
            className="w-full p-3 rounded-xl bg-indigo-600 hover:bg-indigo-500"
          >
            Add Block
          </button>

          <button
            onClick={generatePrompt}
            className="w-full p-3 rounded-xl bg-emerald-600 hover:bg-emerald-500"
          >
            Generate Prompt
          </button>

          <button
            onClick={copyPrompt}
            className="w-full p-3 rounded-xl bg-pink-600 hover:bg-pink-500"
          >
            Copy Prompt
          </button>

        </div>

      </div>

      <div className="flex-1 grid grid-cols-12 gap-4 p-4 overflow-hidden">

        <div className="col-span-8 bg-black/20 border border-white/10 rounded-3xl p-4 flex flex-col overflow-hidden">

          <div className="flex items-center justify-between mb-4">
            <div>
              <h2 className="text-xl font-bold">Workspace</h2>
              <p className="text-sm text-gray-400">
                Drag visual blocks to structure your idea.
              </p>
            </div>

            <div className="flex gap-2">

              <label className="px-4 py-2 rounded-xl bg-white/10 cursor-pointer hover:bg-white/20">
                References
                <input hidden type="file" multiple accept="image/*" onChange={(e)=>handleUpload(e,'reference')} />
              </label>

              <label className="px-4 py-2 rounded-xl bg-white/10 cursor-pointer hover:bg-white/20">
                Sketches
                <input hidden type="file" multiple accept="image/*" onChange={(e)=>handleUpload(e,'sketch')} />
              </label>

            </div>
          </div>

          <div className="relative flex-1 rounded-3xl border border-dashed border-white/10 overflow-hidden grid-bg">

            {blocks.map(block => (
              <div
                key={block.id}
                onMouseDown={() => setDraggingId(block.id)}
                className="absolute rounded-3xl border border-white/10 cursor-grab backdrop-blur-xl shadow-2xl"
                style={{
                  left: block.x,
                  top: block.y,
                  width: block.width,
                  height: block.height,
                  background: block.color
                }}
              >
                <div className="p-4 h-full flex flex-col">
                  <div className="font-bold text-lg mb-3">
                    {block.title}
                  </div>

                  <div className="flex-1 rounded-2xl bg-black/20 border border-white/10 flex items-center justify-center text-center p-3 text-sm text-gray-300">
                    Visual structure area
                  </div>
                </div>
              </div>
            ))}

          </div>
        </div>

        <div className="col-span-4 flex flex-col gap-4 overflow-auto">

          <div className="bg-black/20 border border-white/10 rounded-3xl p-4">
            <h3 className="text-lg font-bold mb-3">AI Selection</h3>

            <div className="space-y-2">
              {['Claude','ChatGPT','Gemini','Cursor','Devin'].map(ai => (
                <button
                  key={ai}
                  onClick={() => setSelectedAI(ai)}
                  className={`w-full text-left p-3 rounded-xl ${selectedAI === ai ? 'bg-indigo-600' : 'bg-white/10 hover:bg-white/20'}`}
                >
                  {ai}
                </button>
              ))}
            </div>
          </div>

          <div className="bg-black/20 border border-white/10 rounded-3xl p-4">
            <h3 className="text-lg font-bold mb-3">Notes</h3>

            <textarea
              value={notes}
              onChange={(e)=>setNotes(e.target.value)}
              className="w-full h-40 rounded-2xl bg-black/20 border border-white/10 p-4 outline-none resize-none"
              placeholder="Write ideas here..."
            />
          </div>

          <div className="bg-black/20 border border-white/10 rounded-3xl p-4">
            <h3 className="text-lg font-bold mb-3">Generated Prompt</h3>

            <textarea
              value={generatedPrompt}
              readOnly
              className="w-full h-64 rounded-2xl bg-black/20 border border-white/10 p-4 outline-none resize-none text-sm"
            />
          </div>

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body>
</html>
